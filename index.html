<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>사칙연산 계산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-100 flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6">

        <header>
            <section>
                <h1 class="text-2xl font-bold text-slate-800 mb-2">
                    사칙연산 계산기
                </h1>

                <p class="text-sm text-slate-500 mb-6">
                    숫자 2개와 연산자를 입력하세요.
                </p>
            </section>
        </header>


        <main class="space-y-4">

            <input maxlength="1" id="num1" placeholder="첫 번째 숫자 입력"
                class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500" />

            <select id="operator"
                class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">
                <option value="+">더하기 +</option>
                <option value="-">빼기 -</option>
                <option value="*">곱하기 *</option>
                <option value="/">나누기 /</option>
            </select>

            <input maxlength="1" id="num2" placeholder="두 번째 숫자 입력"
                class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500" />


            <div class="grid grid-cols-2 gap-3">
                <button onclick="calculate()"
                    class="rounded-xl bg-blue-600 text-white py-3 font-semibold hover:bg-blue-700">
                    계산
                </button>

                <button onclick="resetCalculator()"
                    class="rounded-xl bg-slate-200 text-slate-700 py-3 font-semibold hover:bg-slate-300">
                    초기화
                </button>
            </div>
        </main>


        <footer>
            <section class="mt-6 rounded-xl bg-slate-50 border border-slate-200 p-4">
                <h2 class="font-semibold text-slate-700 mb-2">결과 화면</h2>
                <p id="result" class="text-lg font-bold text-blue-600">
                    결과가 여기에 표시됩니다.
                </p>
            </section>

            <section class="mt-4 rounded-xl bg-slate-50 border border-slate-200 p-4">
                <h2 class="font-semibold text-slate-700 mb-2">계산 기록</h2>
                <ul id="history" class="list-disc list-inside text-slate-600 space-y-1"></ul>
            </section>
        </footer>


    </div>

    <script src="./script.js"></script>
</body>

</html>
